
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #app { padding: 1.5rem 1rem; max-width: 560px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; }
  .section { margin-bottom: 1.5rem; }
  label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px; }
  input[type=text] { width: 100%; padding: 10px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; background: var(--color-background-primary); color: var(--color-text-primary); }
  input[type=text]:focus { outline: none; border-color: var(--color-border-primary); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-primary { width: 100%; padding: 12px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .btn-primary:hover { opacity: 0.85; }
  .game { display: none; }
  .game.active { display: block; }
  .setup { display: block; }
  .setup.hidden { display: none; }
  .players-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .player-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem; text-align: center; }
  .player-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-top: 6px; }
  .player-score { font-size: 28px; font-weight: 500; color: var(--color-text-primary); margin-top: 4px; }
  .vs { font-size: 14px; color: var(--color-text-secondary); font-weight: 500; }
  .moves-title { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 10px; text-align: center; }
  .moves-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .move-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 14px 8px; cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s; }
  .move-btn:hover { border-color: var(--color-border-primary); background: var(--color-background-secondary); }
  .move-btn.selected { border: 1.5px solid var(--color-text-primary); }
  .move-icon { font-size: 28px; display: block; margin-bottom: 4px; }
  .move-label { font-size: 12px; color: var(--color-text-secondary); }
  .turn-banner { text-align: center; font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1rem; }
  .turn-name { color: var(--color-text-primary); font-weight: 500; }
  .result-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; text-align: center; margin-bottom: 1rem; }
  .result-main { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
  .result-detail { font-size: 13px; color: var(--color-text-secondary); }
  .result-detail span { color: var(--color-text-primary); }
  .btn-secondary { width: 100%; padding: 11px; background: transparent; color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; cursor: pointer; margin-top: 8px; }
  .btn-secondary:hover { background: var(--color-background-secondary); }
  .hidden { display: none !important; }
  .avatar { font-size: 30px; line-height: 1; }
  .phase-move { display: block; }
  .phase-result { display: none; }
  .phase-result.show { display: block; }
  .phase-move.hide { display: none; }
  .moves-battle { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 1rem; }
  .move-display { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; text-align: center; }
  .move-display .big { font-size: 36px; }
  .move-display .lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
  .rules-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; margin-bottom: 1.5rem; }
  .rules-box p { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; }
  .animal-deco { text-align: center; font-size: 14px; color: var(--color-text-tertiary); margin-bottom: 1.5rem; letter-spacing: 4px; }
</style>

<div id="app">
  <div class="setup" id="setup">
    <h1>Pedra, Papel e Tesoura</h1>
    <p class="sub">Um duelo selvagem entre dois jogadores.</p>
    <div class="animal-deco">🐻 🦅 🐍</div>
    <div class="rules-box">
      <p>🪨 Pedra (Urso) vence Tesoura &nbsp;·&nbsp; 📄 Papel (Águia) vence Pedra &nbsp;·&nbsp; ✂️ Tesoura (Cobra) vence Papel</p>
    </div>
    <div class="row">
      <div class="section">
        <label>Nome do jogador 1</label>
        <input type="text" id="p1name" placeholder="Ex: Débora" />
      </div>
      <div class="section">
        <label>Nome do jogador 2</label>
        <input type="text" id="p2name" placeholder="Ex: Magnus" />
      </div>
    </div>
    <button class="btn-primary" onclick="startGame()">Começar jogo ↗</button>
  </div>

  <div class="game" id="game">
    <div class="players-row">
      <div class="player-card">
        <div class="avatar">🐻</div>
        <div class="player-name" id="p1label">—</div>
        <div class="player-score" id="score1">0</div>
      </div>
      <div class="vs">vs</div>
      <div class="player-card">
        <div class="avatar">🦅</div>
        <div class="player-name" id="p2label">—</div>
        <div class="player-score" id="score2">0</div>
      </div>
    </div>

    <div class="phase-move" id="phaseMove">
      <div class="turn-banner">Vez de <span class="turn-name" id="turnName"></span> — escolha em segredo</div>
      <div class="moves-grid">
        <button class="move-btn" onclick="selectMove('pedra')">
          <span class="move-icon">🪨</span>
          <span class="move-label">Pedra (Urso)</span>
        </button>
        <button class="move-btn" onclick="selectMove('papel')">
          <span class="move-icon">📄</span>
          <span class="move-label">Papel (Águia)</span>
        </button>
        <button class="move-btn" onclick="selectMove('tesoura')">
          <span class="move-icon">✂️</span>
          <span class="move-label">Tesoura (Cobra)</span>
        </button>
      </div>
      <div id="confirmArea" class="hidden">
        <button class="btn-primary" onclick="confirmMove()">Confirmar jogada</button>
      </div>
    </div>

    <div class="phase-result" id="phaseResult">
      <div class="moves-battle">
        <div class="move-display">
          <div class="big" id="icon1">—</div>
          <div class="lbl" id="mlabel1">—</div>
        </div>
        <div class="vs">vs</div>
        <div class="move-display">
          <div class="big" id="icon2">—</div>
          <div class="lbl" id="mlabel2">—</div>
        </div>
      </div>
      <div class="result-card">
        <div class="result-main" id="resultText">—</div>
        <div class="result-detail" id="resultDetail"></div>
      </div>
      <button class="btn-primary" onclick="nextRound()">Próxima rodada</button>
      <button class="btn-secondary" onclick="resetGame()">Reiniciar jogo</button>
    </div>
  </div>
</div>

<script>
  const icons = { pedra: '🪨', papel: '📄', tesoura: '✂️' };
  const animals = { pedra: 'Urso', papel: 'Águia', tesoura: 'Cobra' };
  let p1, p2, s1 = 0, s2 = 0, m1 = null, m2 = null, turn = 1;

  function startGame() {
    p1 = document.getElementById('p1name').value.trim() || 'Jogador 1';
    p2 = document.getElementById('p2name').value.trim() || 'Jogador 2';
    document.getElementById('p1label').textContent = p1;
    document.getElementById('p2label').textContent = p2;
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.add('active');
    setTurn(1);
  }

  function setTurn(t) {
    turn = t;
    m1 = null; m2 = null;
    document.querySelectorAll('.move-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('confirmArea').classList.add('hidden');
    document.getElementById('turnName').textContent = t === 1 ? p1 : p2;
    document.getElementById('phaseMove').classList.remove('hide');
    document.getElementById('phaseResult').classList.remove('show');
  }

  function selectMove(m) {
    if (turn === 1) m1 = m; else m2 = m;
    document.querySelectorAll('.move-btn').forEach(b => b.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    document.getElementById('confirmArea').classList.remove('hidden');
  }

  function confirmMove() {
    if (turn === 1) {
      if (!m1) return;
      setTurn(2);
    } else {
      if (!m2) return;
      showResult();
    }
  }

  function showResult() {
    document.getElementById('phaseMove').classList.add('hide');
    document.getElementById('phaseResult').classList.add('show');
    document.getElementById('icon1').textContent = icons[m1];
    document.getElementById('icon2').textContent = icons[m2];
    document.getElementById('mlabel1').textContent = p1 + ': ' + animals[m1];
    document.getElementById('mlabel2').textContent = p2 + ': ' + animals[m2];

    let winner = null;
    if (m1 === m2) {
      document.getElementById('resultText').textContent = 'Empate! 🤝';
      document.getElementById('resultDetail').innerHTML = 'Nenhum ponto desta vez.';
    } else if (
      (m1 === 'pedra' && m2 === 'tesoura') ||
      (m1 === 'papel' && m2 === 'pedra') ||
      (m1 === 'tesoura' && m2 === 'papel')
    ) {
      winner = 1; s1++;
    } else {
      winner = 2; s2++;
    }

    if (winner === 1) {
      document.getElementById('resultText').textContent = p1 + ' venceu! 🎉';
      document.getElementById('resultDetail').innerHTML = '<span>' + icons[m1] + ' ' + animals[m1] + '</span> vence ' + animals[m2];
    } else if (winner === 2) {
      document.getElementById('resultText').textContent = p2 + ' venceu! 🎉';
      document.getElementById('resultDetail').innerHTML = '<span>' + icons[m2] + ' ' + animals[m2] + '</span> vence ' + animals[m1];
    }

    document.getElementById('score1').textContent = s1;
    document.getElementById('score2').textContent = s2;
  }

  function nextRound() {
    m1 = null; m2 = null;
    setTurn(1);
  }

  function resetGame() {
    s1 = 0; s2 = 0;
    document.getElementById('score1').textContent = 0;
    document.getElementById('score2').textContent = 0;
    document.getElementById('setup').classList.remove('hidden');
    document.getElementById('game').classList.remove('active');
    document.getElementById('phaseResult').classList.remove('show');
    document.getElementById('phaseMove').classList.remove('hide');
    document.getElementById('p1name').value = '';
    document.getElementById('p2name').value = '';
  }
</script>
